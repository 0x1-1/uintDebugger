name: CI

on:
  push:
    branches: [main]
    tags-ignore:
      - 'v*'
    paths-ignore:
      - '**.md'
      - 'Doxyfile'
      - 'LICENSES.md'
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          cache: true

      - name: Configure CMake
        run: cmake -B Build -G "Visual Studio 17 2022" -A x64 -DCMAKE_PREFIX_PATH="${{ env.QT_ROOT_DIR }}"

      - name: Build
        run: cmake --build Build --config Release --parallel

      - name: Test
        run: ctest --test-dir Build --build-config Release --output-on-failure
