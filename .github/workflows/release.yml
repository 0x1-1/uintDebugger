name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          cache: true

      - name: Configure CMake
        run: cmake -B Build -G "Visual Studio 17 2022" -A x64 -DCMAKE_PREFIX_PATH="${{ env.QT_ROOT_DIR }}"

      - name: Build Release
        run: cmake --build Build --config Release --parallel

      - name: Run Tests
        run: ctest --test-dir Build --build-config Release --output-on-failure

      - name: Generate Update Manifest
        run: powershell -ExecutionPolicy Bypass -File .\tools\New-UpdateManifest.ps1 -ReleaseDir .\Release -Tag "${{ github.ref_name }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "uintDebugger ${{ github.ref_name }}"
          body_path: changelog.md
          files: Release/github-release-assets/**
          draft: false
          prerelease: false
